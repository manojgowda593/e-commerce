<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Microservices</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .nav {
            text-align: center;
            margin-bottom: 30px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            margin: 0 10px;
            display: inline-block;
            transition: background 0.3s;
        }

        .nav a:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .service-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .service-card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: opacity 0.3s ease;
            margin-bottom: 20px;
        }

        button:hover {
            opacity: 0.9;
        }

        .data-display {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            min-height: 200px;
            max-height: 500px;
            overflow-y: auto;
        }

        .data-display pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 1em;
            color: #333;
        }

        .loading {
            color: #667eea;
            font-style: italic;
            font-size: 1.1em;
        }

        .error {
            color: #e74c3c;
            font-weight: 600;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">🏠 Home</a>
        <a href="/users/">👥 Users</a>
        <a href="/products/">📦 Products</a>
        <a href="/orders/">🛒 Orders</a>
    </div>

    <header>
        <h1>👥 User Service</h1>
    </header>

    <div class="container">
        <div class="service-card">
            <h2>User Management</h2>
            <button onclick="loadUsers()">Load All Users</button>
            <div id="users-data" class="data-display">
                <p class="loading">Click the button to load users...</p>
            </div>
        </div>
    </div>

    <script>
        // Emissary will route /api/* to appropriate services
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:8001' 
            : `${window.location.protocol}//${window.location.hostname}/api`;

        async function loadUsers() {
            const element = document.getElementById('users-data');
            element.innerHTML = '<p class="loading">Loading...</p>';
            
            try {
                const response = await fetch(`${API_BASE}/user/`);
                const data = await response.json();
                element.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                element.innerHTML = `<p class="error">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
