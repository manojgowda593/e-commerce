version: '3.8'

services:
  user-service:
    build: ./user_service
    container_name: user-service
    ports:
      - "8001:8001"
    volumes:
      - ./user_service:/app
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - microservices

  product-service:
    build: ./product_service
    container_name: product-service
    ports:
      - "8002:8002"
    volumes:
      - ./product_service:/app
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - microservices

  order-service:
    build: ./order_service
    container_name: order-service
    ports:
      - "8003:8003"
    volumes:
      - ./order_service:/app
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - microservices

  ui-service:
    build: ./ui_service
    container_name: ui-service
    ports:
      - "8080:8080"
    volumes:
      - ./ui_service:/app
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - user-service
      - product-service
      - order-service
    networks:
      - microservices

networks:
  microservices:
    driver: bridge
